{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}The Lease Monkey — Premium Land Plot Management{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Fonts: Ranade (Headings) and Open Sans (Body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=ranade@300,400,500,700,800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <!-- Custom styling -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
    <!-- Background Particles & Watermark -->
    <div id="particles"></div>
    <div class="body-watermark"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top navbar-blur py-3">
        <div class="container">
            <!-- Navbar Brand / Logo -->
            <a class="navbar-brand d-flex align-items-center gap-2 font-ranade fw-bold text-uppercase tracking-wider" href="#">
                <img src="{% static 'images/placeholder.png' %}" alt="Logo" width="36" height="36" class="d-inline-block align-top rounded-circle bg-dark-glow">
                <span class="logo-text">Lease Monkey</span>
            </a>
            
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
                <ul class="navbar-nav gap-3 align-items-center">
                    <li class="nav-item">
                        <a class="nav-link nav-active-box fs-13 fw-bold tracking-wide" href="#">HOME</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-item-link fs-13 fw-bold tracking-wide text-white-50" href="#features">FEATURES</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-item-link fs-13 fw-bold tracking-wide text-white-50" href="#about">ABOUT</a>
                    </li>
                </ul>
            </div>
            
            <!-- Right navbar button -->
            <div class="d-none d-lg-flex align-items-center">
                <a href="#" class="btn btn-login text-uppercase fw-bold fs-12 tracking-wide disabled">Login / Register</a>
            </div>
        </div>
    </nav>

    <!-- Main Content Block -->
    <main>
        {% block content %}{% endblock content %}
    </main>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
